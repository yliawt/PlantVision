<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Vision Form</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Merriweather Font -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Plant Vision  <i class="fas fa-leaf "></i></h1>
        </div>
        <!-- Profile Information Section -->
        <section id="profile_information">
            <form action="mainpage.html" method="POST">
                <div class="mb-3">
                    <fieldset class="border p-3">
                        <legend class="w-auto px-2">Personal</legend>
                        <div class="mb-3 input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="aboutMe" placeholder="Describe yourself" oninput="limitWords(this)">
                        </div>
                        <select class="form-select" id="userType">
                            <option disabled selected>Please choose</option>
                            <option value="newbie">Newbie</option>
                            <option value="interest">Interest</option>
                            <option value="collector">Collector</option>
                        </select>
                    </fieldset>
                </div>
                <div class="mb-3">
                    <fieldset class="border p-3">
                        <legend class="w-auto px-2">Contact</legend>
                        <div class="mb-3 input-group">
                            <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                            <input type="text" class="form-control" id="state" placeholder="Enter your state">
                        </div>
                        <div class="mb-3 input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" class="form-control" id="contactNumber" placeholder="Contact number">
                        </div>
                        <div class="mb-3 input-group">
                            <span class="input-group-text"><i class="fab fa-instagram"></i></span>
                            <input type="text" class="form-control" id="instagram" placeholder="Instagram">
                        </div>
                        <div class="mb-3 input-group">
                            <span class="input-group-text"><i class="fab fa-facebook-square"></i></span>
                            <input type="text" class="form-control" id="facebook" placeholder="Facebook">
                        </div>
                    </fieldset>
                </div>
                <button type="submit" class="btn btn-success">Submit</button>
                <br><br>
                <a href="someotherpage.html" style="text-decoration: none; color: #666;">Skip</a>
            </form>
        </section>
    </div>

    <script>
        function limitWords(textbox) {
            var maxWords = 30;
            var words = textbox.value.split(/[\s]+/);
            if (words.length > maxWords) {
                // Limit words to the maxWords count
                textbox.value = words.slice(0, maxWords).join(" ");
                alert('You can only type 30 words!');
            }
        }
    </script>
</body>
</html>
