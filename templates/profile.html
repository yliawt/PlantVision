<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Plant Vision Form</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.5.0/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.css') }}" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>

  <style>
   .profile body {
  font-family: 'Merriweather', serif;
  background-color: #ffffff;
  margin: 0;
  padding: 0;
}
.profile .profileheader {
  padding-bottom: 20px;
}
.profile .profile-container {
  padding: 40px 20px;
  max-width: 600px;
  margin: 0 auto;
}
.profile .profile-container h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
  text-align: left;
}
.profile .profile-container h2 {
  font-size: 1.2rem;
  margin-bottom: 10px;
  text-align: left;
  border-bottom: 1px solid #474747;
  padding-bottom: 5px;
}
.profile .profile-container .btn {
  background-color: #e0e0e0;
  border: none;
  border-radius: 20px;
  padding: 10px 20px;
  margin-bottom: 40px;
  display: block;
  width: 100%;
}
.profile .profile-section {
  margin-bottom: 30px;
  padding: 0 20px;
}
.profile  .profile-option {
  display: flex;
  align-items: center;
  font-size: 0.9rem;
  padding: 5px 0;
  color: black;
  text-decoration: none;
}

.profile .profile-option:hover {
      text-decoration: none;
      color: #007bff; 
   }

   .profile .profile-option a {
      color: black;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .profile .profile-option a:hover {
      text-decoration: none;
      color: #007bff; /* Bootstrap primary color for hover */
    }
  </style>

<body class="index-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="/index" class="logo d-flex align-items-center">
        <h1 class="sitename">PlantVision <i class="fas fa-leaf text-success"></i></h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="/index">Home</a></li>
          <li><a href="/identify">Identify</a></li>
          <li><a href="/discover">Discover</a></li>
          <li><a href="/aboutus">About us</a></li>
          <li><a href="/profile" class="active">Profile</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
    </div>
  </header>

  <main class="main">
    <section id="profile" class="profile section">
    <div class="profile-container">
      <div class="profileheader">
        <h1>Welcome,<br>{{ username }}</h1>
      </div>

      <div class="profile-section">
        <h2>Profile Section</h2>
        <div class="profile-option" data-bs-toggle="modal" data-bs-target="#viewProfileModal">
          <i class="bi bi-person"></i>
          <span>View Profile</span>
        </div>
      </div>

    
      <div class="profile-section">
        <h2>Account Privacy</h2>
        <div class="profile-option" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
          <i class="bi bi-key"></i>
          <span>Change Password</span>
        </div>
        <div class="profile-option">
          <a href="/"><i class="bi bi-box-arrow-right"></i>
            <span>Log Out</span></a>
          </div>
      </div>
    </div>
  </section>
  </main>

  <!-- Modals -->
  <div class="modal fade" id="viewProfileModal" tabindex="-1" aria-labelledby="viewProfileModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="viewProfileModalLabel">View Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Content for View Profile -->
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" value="Liaw Yee">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" value="liawyee@example.com" readonly>
          </div>
          <div class="mb-3">
            <label for="selfDescription" class="form-label">Self Description</label>
            <textarea class="form-control" id="selfDescription" rows="3">Plant enthusiast and collector.</textarea>
          </div>
          <div class="mb-3">
            <label for="identity" class="form-label">Identity</label>
            <select class="form-control" id="identity">
              <option value="Newbie" selected>Newbie</option>
              <option value="Interest">Interest</option>
              <option value="Collector">Colector</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="state" class="form-label">State</label>
            <select class="form-control" id="state">
              <option value="Sarawak" selected>Sarawak</option>
              <option value="Sabah">Sabah</option>
              <option value="Johor">Johor</option>
              <option value="Kedah">Kedah</option>
              <option value="Kelantan">Kelantan</option>
              <option value="Malacca">Malacca</option>
              <option value="Negeri Sembilan">Negeri Sembilan</option>
              <option value="Pahang">Pahang</option>
              <option value="Penang">Penang</option>
              <option value="Perak">Perak</option>
              <option value="Perlis">Perlis</option>
              <option value="Selangor">Selangor</option>
              <option value="Terengganu">Terengganu</option>
              <option value="Kuala Lumpur">Kuala Lumpur</option>
              <option value="Labuan">Labuan</option>
              <option value="Putrajaya">Putrajaya</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="contactNumber" class="form-label">Contact Number</label>
            <input type="text" class="form-control" id="contactNumber" value="+60 123456789" >
          </div>
          <div class="mb-3">
            <label for="instagram" class="form-label">Instagram</label>
            <input type="text" class="form-control" id="instagram" value="@liawyee">
          </div>
          <div class="mb-3">
            <label for="facebook" class="form-label">Facebook</label>
            <input type="text" class="form-control" id="facebook" value="facebook.com/liawyee">
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Save</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="changePasswordModalLabel">Change Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Content for Change Password -->
          <form id="changePasswordForm">
            <div class="mb-3">
              <label for="currentPassword" class="form-label">Current Password</label>
              <input type="password" class="form-control" id="currentPassword" required>
            </div>
            <div class="mb-3">
              <label for="newPassword" class="form-label">New Password</label>
              <input type="password" class="form-control" id="newPassword" required>
            </div>
            <div class="mb-3">
              <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="confirmNewPassword" required>
              <div class="invalid-feedback">
                Passwords do not match.
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Change Password</button>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <footer id="footer" class="footer light-background">
    <div class="container">
      <div class="row g-4">
        <div class="col-md-6 col-lg-3 mb-3 mb-md-0">
          <div class="widget">
            <h3 class="widget-heading">Plant Vision</h3>
            <p class="mb-4">The community for all collectors.</p>
          </div>
        </div>
      </div>
    </div>
  </footer>

  <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- Vendor JS Files -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Vendor JS Files -->
    <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/aos/aos.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/swiper/swiper-bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/purecounter/purecounter_vanilla.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/glightbox/js/glightbox.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/imagesloaded/imagesloaded.pkgd.min.js') }}"></script>
    <script src="{{ url_for('static', filename='vendor/isotope-layout/isotope.pkgd.min.js') }}"></script>
  
    <!-- Main JS File -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
   
  <link href="{{ url_for('static', filename='js/main.js') }}" rel="stylesheet">
  <script>
    document.getElementById('changePasswordForm').addEventListener('submit', function (event) {
      event.preventDefault();
      var newPassword = document.getElementById('newPassword').value;
      var confirmNewPassword = document.getElementById('confirmNewPassword').value;

      if (newPassword !== confirmNewPassword) {
        document.getElementById('confirmNewPassword').classList.add('is-invalid');
      } else {
        document.getElementById('confirmNewPassword').classList.remove('is-invalid');
        // Proceed with form submission or further processing
        alert('Password changed successfully!');
        document.getElementById('changePasswordForm').reset();
        var changePasswordModal = new bootstrap.Modal(document.getElementById('changePasswordModal'));
        changePasswordModal.hide();
      }
    });
  </script>
</body>

</html>
